name: Build S1002NT BORE LTO Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    name: build-6.18.36_LTS-S1002NT-BORE-LTO

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4

    - name: 2. Install Build Dependencies
      run: |
        sudo apt-get update
        # Derleme ve yamalama için gerekli temel paketler
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev clang llvm lld bc cpio kmod patch wget

    - name: 3. Clone Vanilla Linux Kernel Source
      run: |
        # Saf LTS v6.18.36 çekirdek kaynak kodunu sığ (hızlı) olarak çeker
        git clone --depth=1 --branch v6.18.36 https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-source

    - name: 4. Fetch CachyOS Patches via Standard Git Clone
      run: |
        # Yol karmaşası olmasın diye doğrudan ana çalışma dizinine (Workspace) klonluyoruz (Başına ../ koymadık)
        git clone --depth=1 https://github.com/cachyos/kernel-patches.git cachyos-patches
        
        cd linux-source
        # linux-source içerisinden bir üst klasördeki (..) cachyos-patches'a artık rahatça erişebiliriz
        if [ -d "../cachyos-patches/6.18" ]; then
          echo "✅ CachyOS 6.18 klasörü başarıyla doğrulandı! Yamalar dikiliyor..."
          find ../cachyos-patches/6.18/ -type f -name "*.patch" | sort | while read -r patch_file; do
            echo "Uygulanan yama: $patch_file"
            patch -p1 --batch --forward < "$patch_file" || echo "⚠️ Bazı hunklar zaten uygulanmış olabilir, devam ediliyor..."
          done
        else
          echo "❌ HATA: cachyos-patches/6.18 klasörü bulunamadı!"
          exit 1
        fi

    - name: 5. Include Only Target Drivers (localmodconfig)
      run: |
        cd linux-source
        # Varsayılan temel konfigürasyonu oluştur
        make defconfig
        
        # Ana dizindeki lsmod.txt dosyasını kopyala ve sadece bu donanımları göm
        cp ../lsmod.txt .
        yes "" | make LSMOD=lsmod.txt localmodconfig

    - name: 6. Inject ThinLTO, Custom Name & Strip All Debug Files
      run: |
        cd linux-source
        
        # --- ÖZEL ÇEKİRDEK İSMİ (CONFIG_LOCALVERSION) ---
        ./scripts/config --set-str CONFIG_LOCALVERSION "_LTS-S1002NT-BORE-LTO"
        
        # --- CACHYOS PERFORMANS VE BORE SEÇENEKLERİ ---
        ./scripts/config --enable CONFIG_SCHED_BORE
        ./scripts/config --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
        ./scripts/config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3
        ./scripts/config --disable CONFIG_HZ_250
        ./scripts/config --disable CONFIG_HZ_300
        ./scripts/config --enable CONFIG_HZ_1000
        ./scripts/config --set-val CONFIG_HZ 1000
        ./scripts/config --disable CONFIG_PREEMPT_NONE
        ./scripts/config --disable CONFIG_PREEMPT_VOLUNTARY
        ./scripts/config --enable CONFIG_PREEMPT
        ./scripts/config --enable CONFIG_PREEMPT_COUNT
        ./scripts/config --enable CONFIG_PREEMPTION
        ./scripts/config --enable CONFIG_SCHED_AUTOGROUP
        ./scripts/config --enable CONFIG_PREEMPT_DYNAMIC
        
        # --- SIFIR DEBUG SEMBOLÜ (Boyutu uçuran her şeyi kapat) ---
        ./scripts/config --enable CONFIG_DEBUG_INFO_NONE
        ./scripts/config --disable CONFIG_DEBUG_INFO
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF4
        ./scripts/config --disable CONFIG_DEBUG_INFO_DWARF5
        ./scripts/config --disable CONFIG_DEBUG_INFO_BTF
        ./scripts/config --disable CONFIG_DEBUG_KERNEL
        ./scripts/config --disable CONFIG_DEBUG_MISC
        
        # --- THINLTO OPTİMİZASYONUNU AKTİF ET ---
        ./scripts/config --disable CONFIG_LTO_NONE
        ./scripts/config --enable CONFIG_LTO_CLANG_THIN
        
        # Tüm bu ayarları çekirdek mimarisine kilitle
        make olddefconfig

    - name: 7. Compile Kernel with LLVM/Clang (ThinLTO & x86-64-v4)
      run: |
        cd linux-source
        # Derleyiciyi ThinLTO ve işlemci mimari bayraklarıyla (v4) ateşle
        make -j$(nproc) LLVM=1 KCFLAGS="-O3 -march=x86-64-v4" bzImage modules

    - name: 8. Prepare Clean Artifacts (No Symlinks, Custom Named Files)
      run: |
        mkdir -p kernel-artifacts
        
        cd linux-source
        # Çekirdek imajını, config ve haritasını yeni isimlendirmeyle kopyala
        cp arch/x86/boot/bzImage ../kernel-artifacts/vmlinuz-6.18.36_LTS-S1002NT-BORE-LTO
        cp .config ../kernel-artifacts/config-6.18.36_LTS-S1002NT-BORE-LTO
        cp System.map ../kernel-artifacts/System.map-6.18.36_LTS-S1002NT-BORE-LTO
        
        # Sürücü modüllerini sembollerden arındırarak (INSTALL_MOD_STRIP=1) yükle
        make LLVM=1 KCFLAGS="-O3 -march=x86-64-v4" INSTALL_MOD_STRIP=1 modules_install INSTALL_MOD_PATH=../kernel-artifacts
        
        # GitHub Artifacts aracının kaynak kodları içeri çekmesini engelleyen sembolik bağları yok et
        rm -f ../kernel-artifacts/lib/modules/*/build
        rm -f ../kernel-artifacts/lib/modules/*/source

    - name: 9. Upload Pure Optimized Kernel Package
      uses: actions/upload-artifact@v4
      with:
        name: 6.18.36_LTS-S1002NT-BORE-LTO
        path: kernel-artifacts/
        if-no-files-found: error
