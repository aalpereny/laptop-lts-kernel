- name: Thin-LTO ve Sürücü Kararlılık Ayarları
      run: |
        cd linux-source
        
        # 1. Doğru Clang LTO Değişkenlerini Ayarlıyoruz (Burayı Düzelttik)
        scripts/config --disable CONFIG_LTO_NONE
        scripts/config --disable CONFIG_LTO_CLANG_FULL
        scripts/config --enable CONFIG_LTO_CLANG_THIN
        
        # 2. Nvidia Open ve Kararlılık Ayarları
        scripts/config --enable CONFIG_MODULES
        scripts/config --enable CONFIG_SYSFS
        scripts/config --enable CONFIG_PROC_FS
        scripts/config --enable CONFIG_X86_PAT
        scripts/config --disable CONFIG_DEBUG_INFO_BTF

        # 3. SİHİRLİ DOKUNUŞ: Çekirdeğin interaktif soru sormasını engelle, 
        # Thin-LTO bağımlılıklarını arka planda otomatik olarak çöz ve kaydet.
        make LLVM=1 olddefconfig
